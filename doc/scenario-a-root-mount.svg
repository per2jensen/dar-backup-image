<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Scenario A — map host / to container /data</title>
  <desc>Diagram showing that mounting the host root filesystem at /data inside the container makes all host paths accessible, enabling multiple backup definitions.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="420" fill="#ffffff"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#1a1a18">Scenario A — map host <tspan font-family="ui-monospace, monospace" font-size="14">/</tspan> to container <tspan font-family="ui-monospace, monospace" font-size="14">/data</tspan></text>

  <!-- ── HOST BOX ── -->
  <rect x="24" y="46" width="252" height="250" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="150" y="68" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#085041">Host filesystem</text>

  <!-- host root label -->
  <text x="36" y="89" font-family="ui-monospace, monospace" font-size="12" fill="#0F6E56">/  (root)</text>

  <!-- host dir 1 -->
  <rect x="36" y="98" width="228" height="36" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="150" y="113" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#085041">/home/alice/photos</text>
  <text x="150" y="127" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#0F6E56">source data</text>

  <!-- host dir 2 -->
  <rect x="36" y="144" width="228" height="36" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="150" y="159" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#085041">/home/bob/documents</text>
  <text x="150" y="173" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#0F6E56">source data</text>

  <!-- host dir 3 -->
  <rect x="36" y="190" width="228" height="36" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="150" y="205" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#085041">/srv/media</text>
  <text x="150" y="219" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#0F6E56">source data</text>

  <!-- host ellipsis -->
  <text x="150" y="252" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-style="italic" fill="#085041">… and all other host paths</text>
  <text x="150" y="268" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-style="italic" fill="#085041">are reachable under /data</text>

  <!-- ── MOUNT ARROW ── -->
  <line x1="280" y1="171" x2="360" y2="171" stroke="#0F6E56" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="283" y="143" width="74" height="24" rx="4" fill="#E1F5EE"/>
  <text x="320" y="155" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#085041">-v /:/data</text>

  <!-- ── CONTAINER BOX ── -->
  <rect x="368" y="46" width="288" height="250" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="512" y="68" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#3C3489">Container</text>

  <!-- /data outer box -->
  <rect x="380" y="78" width="264" height="202" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.8"/>
  <text x="512" y="97" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#3C3489">/data  ←  host /</text>

  <!-- container path 1 -->
  <rect x="392" y="106" width="240" height="28" rx="5" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text x="512" y="124" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#26215C">/data/home/alice/photos</text>

  <!-- container path 2 -->
  <rect x="392" y="142" width="240" height="28" rx="5" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text x="512" y="160" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#26215C">/data/home/bob/documents</text>

  <!-- container path 3 -->
  <rect x="392" y="178" width="240" height="28" rx="5" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text x="512" y="196" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#26215C">/data/srv/media</text>

  <text x="512" y="240" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-style="italic" fill="#3C3489">… all paths accessible</text>
  <text x="512" y="256" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-style="italic" fill="#3C3489">under /data</text>

  <!-- ── BACKUP.D BOX ── -->
  <rect x="368" y="312" width="288" height="90" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="512" y="332" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#633806">backup.d — multiple definitions</text>

  <rect x="380" y="342" width="264" height="22" rx="4" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text x="512" y="357" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#412402">-g data/home/alice/photos</text>

  <rect x="380" y="370" width="264" height="22" rx="4" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text x="512" y="385" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#412402">-g data/home/bob/documents</text>

  <!-- arrow container → backup.d -->
  <line x1="512" y1="298" x2="512" y2="310" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- ── RESULT NOTE ── -->
  <rect x="24" y="312" width="252" height="70" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="40" y="333" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#3B6D11">✓  Works for many definitions</text>
  <text x="40" y="352" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#27500A">Each definition targets a different</text>
  <text x="40" y="367" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#27500A">subtree — all resolve correctly.</text>
</svg>
